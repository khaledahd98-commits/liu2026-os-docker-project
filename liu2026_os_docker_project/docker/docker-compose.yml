services:
  db:
    image: mysql:8.0
    container_name: liu_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_fst
      MYSQL_DATABASE: liu_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: ./web
    container_name: liu_web
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root_password_fst
      DB_NAME: liu_db
    ports:
      - "5000:5000"

volumes:
  mysql_data:
